<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>10kScope — CA Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --surface: #0e0e1a;
    --card: #121224;
    --border: #1e1e38;
    --accent: #836EF9;
    --accent2: #200052;
    --green: #00ffb3;
    --red: #ff4d6d;
    --yellow: #f5c542;
    --text: #e8e8ff;
    --muted: #5a5a8a;
    --glow: rgba(131,110,249,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(131,110,249,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(0,255,179,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---- NAVBAR ---- */
  nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0.75rem;
  height: 56px;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  gap: 6px;
  overflow: visible; /* ensure nothing clips children */
}

  .logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .95rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  flex-shrink: 0;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
    }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.5;transform:scale(1.3)}
  }

  .nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  flex-shrink: 1; /* this one compresses, not the button */
  min-width: 0;
    }
  .nav-tab {
    padding: 6px 18px;
    border-radius: 7px;
    cursor: pointer;
    font-size: .82rem;
    font-weight: 600;
    color: var(--muted);
    transition: all .2s;
    border: none;
    background: transparent;
    font-family: 'Syne', sans-serif;
  }
  .nav-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px rgba(131,110,249,0.4);
  }
  .nav-tab:hover:not(.active) { color: var(--text); }

  .nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0; /* prevents button from being squeezed out */
  }
 .connect-btn {
  padding: 6px 10px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #5b45c8);
  color: #fff;
  font-size: .72rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  transition: all .2s;
  box-shadow: 0 0 16px rgba(131,110,249,0.3);
  white-space: nowrap;
  flex-shrink: 0;
    }
  .connect-btn:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(131,110,249,0.5); }

  /* ---- PAGES ---- */
  .page { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .page.active { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* ---- PAGE 1: CA TRACKER ---- */
  .search-area {
    margin-bottom: 2rem;
  }
  .search-label {
  font-size: .75rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: .5rem;
  text-align: center;
}
  .search-row {
    display: flex;
    gap: 10px;
  }
  .ca-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: .85rem;
    outline: none;
    transition: border .2s;
  }
  .ca-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  .ca-input::placeholder { color: var(--muted); }

  .search-btn {
    padding: 12px 22px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: .85rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all .2s;
  }
  .search-btn:hover { background: #9580ff; }

  /* Recent CAs */
    .section-title {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
    }

  .ca-result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    animation: fadeUp .3s ease;
    position: relative;
    overflow: hidden;
  }
  .ca-result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .ca-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1rem;
  }
  .token-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    font-weight: 800;
    flex-shrink: 0;
  }
  .token-info h2 { font-size: 1.1rem; font-weight: 800; }
  .token-info .ticker { font-size: .78rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .token-addr {
    font-family: 'Space Mono', monospace;
    font-size: .72rem;
    color: var(--muted);
    margin-top: 2px;
    cursor: pointer;
  }
  .token-addr:hover { color: var(--accent); }

  .ca-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 1rem;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .stat-box .s-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-box .s-val { font-size: 1rem; font-weight: 700; margin-top: 2px; }

  /* AI Preview */
  .ai-preview {
    background: linear-gradient(135deg, rgba(131,110,249,0.08), rgba(0,255,179,0.04));
    border: 1px solid rgba(131,110,249,0.25);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-top: .8rem;
  }
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: .68rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: .5rem;
  }
  .ai-badge::before {
    content: '✦';
  }
  .ai-text {
    font-size: .85rem;
    line-height: 1.6;
    color: #b0b0d8;
  }
  .ai-text.loading {
    color: var(--muted);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%,100%{opacity:.5} 50%{opacity:1}
  }
  
<button class="hamburger" onclick="toggleMenu()">
  <span></span>
  <span></span>
  <span></span>
</button>
  
  .risk-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .7rem;
    font-weight: 700;
    margin-left: 8px;
  }
  .risk-low { background: rgba(0,255,179,.12); color: var(--green); }
  .risk-mid { background: rgba(245,197,66,.12); color: var(--yellow); }
  .risk-high { background: rgba(255,77,109,.12); color: var(--red); }

  /* Recent tracked */
  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .recent-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .recent-item:hover { border-color: var(--accent); background: rgba(131,110,249,0.06); }
  .ri-left { display: flex; align-items: center; gap: 10px; }
  .ri-icon { width: 34px; height: 34px; border-radius: 50%; display:flex;align-items:center;justify-content:center; font-size:.9rem;font-weight:800; }
  .ri-name { font-size: .88rem; font-weight: 700; }
  .ri-addr { font-size: .68rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .ri-price { font-size: .9rem; font-weight: 700; text-align: right; }
  .ri-change { font-size: .72rem; text-align: right; font-weight: 600; }

  /* ---- PAGE 2: PRICES ---- */
  .prices-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 10px;
  }
  .page-heading { font-size: 1.8rem; font-weight: 800; }
  .page-heading span { color: var(--accent); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Syne', sans-serif;
  }
  .filter-chip.active, .filter-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(131,110,249,0.08);
  }

  .prices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .price-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem;
    transition: all .2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .price-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--glow);
  }
  .pc-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .pc-icon { width: 40px; height: 40px; border-radius: 50%; display:flex;align-items:center;justify-content:center; font-size:1rem;font-weight:800; }
  .pc-name { font-size: 1rem; font-weight: 800; }
  .pc-ticker { font-size: .72rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .pc-price { font-size: 1.5rem; font-weight: 800; margin-bottom: 2px; }
  .pc-change { font-size: .82rem; font-weight: 700; }
  .pc-stats {
    display: flex;
    gap: 8px;
    margin-top: .8rem;
    border-top: 1px solid var(--border);
    padding-top: .8rem;
  }
  .pc-stat { flex: 1; }
  .pc-stat .lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .pc-stat .val { font-size: .82rem; font-weight: 600; margin-top: 2px; }

  /* Sparkline */
  .sparkline { width: 100%; height: 40px; margin-top: .5rem; }

  /* ---- PAGE 3: WALLET ---- */
  .wallet-input-area {
    margin-bottom: 2rem;
  }
  .wallet-result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    animation: fadeUp .3s ease;
  }
  .wallet-header {
    background: linear-gradient(135deg, rgba(131,110,249,0.15), rgba(0,0,0,0));
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .wallet-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    font-weight: 800;
    flex-shrink: 0;
  }
  .wallet-addr-full {
    font-family: 'Space Mono', monospace;
    font-size: .78rem;
    color: var(--muted);
    word-break: break-all;
    margin-top: 4px;
  }
  .wallet-name { font-size: 1.1rem; font-weight: 800; }
  .wallet-net-worth {
    margin-left: auto;
    text-align: right;
  }
  .wnw-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .wnw-val { font-size: 1.6rem; font-weight: 800; }

  .wallet-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .w-tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-size: .82rem;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .w-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .wallet-body { padding: 1.5rem; }

  .holdings-list { display: flex; flex-direction: column; gap: 10px; }
  .holding-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color .2s;
  }
  .holding-item:hover { border-color: var(--accent); }
  .h-icon { width: 38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;flex-shrink:0; }
  .h-info { flex: 1; }
  .h-name { font-size: .9rem; font-weight: 700; }
  .h-bal { font-size: .75rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .h-right { text-align: right; }
  .h-usd { font-size: .95rem; font-weight: 700; }
  .h-pct { font-size: .72rem; font-weight: 600; margin-top: 2px; }

  /* Tx list */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .tx-type-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    display:flex;align-items:center;justify-content:center;
    font-size:.85rem;
    flex-shrink:0;
  }
  .tx-type-icon.send { background: rgba(255,77,109,.12); }
  .tx-type-icon.recv { background: rgba(0,255,179,.12); }
  .tx-type-icon.swap { background: rgba(131,110,249,.12); }
  .tx-info { flex: 1; }
  .tx-name { font-size: .85rem; font-weight: 700; }
  .tx-hash { font-size: .68rem; color: var(--muted); font-family: 'Space Mono', monospace; cursor:pointer; }
  .tx-hash:hover { color: var(--accent); }
  .tx-right { text-align: right; }
  .tx-val { font-size: .88rem; font-weight: 700; }
  .tx-time { font-size: .68rem; color: var(--muted); margin-top: 2px; }

  /* Tabs hidden content */
  .w-panel { display: none; }
  .w-panel.active { display: block; animation: fadeUp .2s ease; }

  /* Helpers */
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--muted); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--accent);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: .82rem;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Monad Network badge */
  .network-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .72rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
  }
  .net-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .es-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .4; }
  .empty-state p { font-size: .9rem; }

  @media(max-width:600px) {
    nav { padding: 0 1rem; }
    .nav-tabs .nav-tab { padding: 5px 10px; font-size: .75rem; }
    .page { padding: 1rem; }
    .prices-grid { grid-template-columns: 1fr; }
    .wnw-val { font-size: 1.2rem; }
  }
  /* ---- MOBILE FIX ---- */

}

}
  .logo { font-size: .9rem; }
}
  .hamburger {
  display: none;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;

  gap: 5px;
  align-items: center;
  justify-content: center;
}

.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
}

@media(max-width: 768px) {
  .nav-tabs { display: none; }
  .hamburger { display: flex; }
  }

.mobile-menu {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem;
  gap: 8px;
  position: sticky;
  top: 56px;
  z-index: 99;
}

.mobile-menu.open { display: flex; }

@media(max-width: 768px) {
  .nav-tabs { display: none; }
  .hamburger { display: block; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <div class="logo-dot"></div>
    10kScope
  </div>
  <div class="nav-right">
    <div class="network-badge"><div class="net-dot"></div>Monad</div>
    <button class="connect-btn" onclick="connectWallet()">Connect Wallet</button>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </div>
</nav>

// ========== CA TRACKER ==========
async function lookupCA() {
  const val = document.getElementById('caInput').value.trim();
  if (!val) { showToast('\u26a0\ufe0f Please enter a contract address'); return; }

  document.getElementById('caResult').innerHTML = `
    <div class="ca-result-card" style="text-align:center;padding:2.5rem">
      <div style="font-size:1.8rem;animation:pulse 1.5s infinite">\u2b21</div>
      <div style="color:var(--muted);margin-top:.8rem;font-size:.85rem">Fetching token data...</div>
    </div>
  `;

  try {
    const res = await fetch('https://api.dexscreener.com/latest/dex/tokens/' + val);
    const data = await res.json();
    const pairs = data.pairs;

    if (!pairs || pairs.length === 0) {
      document.getElementById('caResult').innerHTML = `
        <div class="ca-result-card" style="text-align:center;padding:2rem">
          <div style="font-size:1.5rem">\ud83d\udd0d</div>
          <div style="color:var(--muted);margin-top:.8rem;font-size:.85rem">No pairs found for this address.<br>It may not be listed on any DEX yet.</div>
        </div>
      `;
      return;
    }

    const best = pairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0))[0];
    const change = parseFloat(best.priceChange?.h24 || 0);
    const price = parseFloat(best.priceUsd || 0);
    const priceStr = price === 0 ? 'N/A'
      : price < 0.000001 ? '$' + price.toExponential(2)
      : price < 0.01 ? '$' + price.toFixed(6)
      : price < 1 ? '$' + price.toFixed(4)
      : '$' + price.toFixed(2);

    const token = {
      name: best.baseToken.name,
      ticker: best.baseToken.symbol,
      addr: val.slice(0, 8) + '...' + val.slice(-6),
      addrFull: val,
      price: priceStr,
      change: (change >= 0 ? '+' : '') + change.toFixed(2) + '%',
      liquidity: formatNum(best.liquidity?.usd),
      holders: 'See Explorer',
      supply: formatNum(best.fdv),
      color: '#836EF9',
      emoji: best.baseToken.symbol.slice(0, 2),
      risk: Math.abs(change) > 30 ? 'high' : Math.abs(change) > 10 ? 'mid' : 'low',
      dexUrl: best.url,
      ai: buildAIText(best),
    };

    renderCAResult(token);

    if (!RECENT_TRACKED.find(t => t.name === token.name)) {
      RECENT_TRACKED.unshift(token);
      if (RECENT_TRACKED.length > 5) RECENT_TRACKED.pop();
      renderRecent();
    }

  } catch (err) {
    console.error(err);
    document.getElementById('caResult').innerHTML = `
      <div class="ca-result-card" style="text-align:center;padding:2rem">
        <div style="color:var(--red)">\u26a0\ufe0f Failed to fetch. Check address or connection.</div>
      </div>
    `;
  }
}

function buildAIText(pair) {
  const change = parseFloat(pair.priceChange?.h24 || 0);
  const liq = parseFloat(pair.liquidity?.usd || 0);
  const vol = parseFloat(pair.volume?.h24 || 0);
  const name = pair.baseToken.name;
  const sym = pair.baseToken.symbol;
  const dex = pair.dexId || 'a DEX';
  const age = pair.pairCreatedAt
    ? Math.floor((Date.now() - pair.pairCreatedAt) / 86400000) + ' days old'
    : 'age unknown';

  let riskNote = 'Liquidity appears healthy relative to volume.';
  if (liq < 10000) riskNote = 'Liquidity is very low — high slippage and rug risk possible.';
  else if (liq < 100000) riskNote = 'Moderate liquidity — use caution on larger trades.';

  return name + ' ($' + sym + ') is trading on ' + dex + ', pair is ' + age + '. ' +
    'Price is ' + (change >= 0 ? 'up' : 'down') + ' ' + Math.abs(change).toFixed(1) + '% in the last 24h with $' + (vol/1000).toFixed(0) + 'K in volume. ' +
    'Liquidity stands at ' + formatNum(liq) + '. ' + riskNote + ' ' +
    (Math.abs(change) > 50 ? '\u26a0\ufe0f Extreme price movement detected \u2014 be cautious. ' : '') +
    'Always verify contract ownership and audit status before investing.';
}

function renderCAResult(token) {
  const riskClass = token.risk === 'low' ? 'risk-low' : token.risk === 'mid' ? 'risk-mid' : 'risk-high';
  const riskLabel = token.risk === 'low' ? '✓ Low Risk' : token.risk === 'mid' ? '⚠ Medium Risk' : '🔴 High Risk';
  const changeClass = parseFloat(token.change) >= 0 ? 'pos' : 'neg';

  document.getElementById('caResult').innerHTML = `
    <div class="ca-result-card">
      <div class="ca-top">
        <div class="token-icon" style="background:${token.color}22;color:${token.color}">${token.emoji}</div>
        <div class="token-info">
          <h2>${token.name} <span class="risk-badge ${riskClass}">${riskLabel}</span></h2>
          <div class="ticker">$${token.ticker}</div>
          <div class="token-addr" onclick="copyAddr('${token.addr}')">${token.addr} 📋</div>
        </div>
      </div>
      <div class="ca-stats">
        <div class="stat-box">
          <div class="s-label">Price</div>
          <div class="s-val">${token.price}</div>
        </div>
        <div class="stat-box">
          <div class="s-label">24h Change</div>
          <div class="s-val ${changeClass}">${token.change}</div>
        </div>
        <div class="stat-box">
          <div class="s-label">Liquidity</div>
          <div class="s-val">${token.liquidity}</div>
        </div>
        <div class="stat-box">
          <div class="s-label">Holders</div>
          <div class="s-val">${token.holders}</div>
        </div>
        <div class="stat-box">
          <div class="s-label">Supply</div>
          <div class="s-val">${token.supply}</div>
        </div>
      </div>
      <div class="ai-preview">
        <div class="ai-badge">AI Analysis</div>
        <div class="ai-text" id="aiTextArea">
          <span class="loading">Generating analysis...</span>
        </div>
      </div>
    </div>
  `;

  // Simulate AI typing
  setTimeout(() => {
    const el = document.getElementById('aiTextArea');
    if (el) {
      el.innerHTML = '';
      el.classList.remove('loading');
      typeText(el, token.ai, 18);
    }
  }, 900);
}

function typeText(el, text, delay) {
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(next, delay);
    }
  }
  next();
}

function copyAddr(addr) {
  navigator.clipboard?.writeText(addr);

async function fetchAndRenderPrices() {
  const grid = document.getElementById('pricesGrid');
  grid.innerHTML = `<div style="color:var(--muted);padding:2rem;grid-column:1/-1;text-align:center">
    <div style="font-size:1.5rem;margin-bottom:.5rem;animation:pulse 1.5s infinite">⬡</div>
    Loading Monad ecosystem prices...
  </div>`;

  // Known Monad mainnet PAIR addresses (not token CAs) — these are the actual trading pair contracts
  const MONAD_PAIRS = [
    '0x9a5B9E78FEdEcdbFe89e4d41Bd44eDCFBD5E4E4a', // MON/USDC
    '0x116e7d070f1888b81e1e0324f56d6746b2d7d8f1', // CHOG/WMON
    '0x212fde77a42d55f980d0a0304e7eebe1e999c60f', // YAKI/WMON
    '0x5a73f1ff9cad2dfa768ac681b6a74f6a60a4c62b', // CHOG/MON (LFJ)
  ];

  try {
    // Strategy 1: fetch by known pair addresses on monad chain
    const pairsUrl = `https://api.dexscreener.com/latest/dex/pairs/monad/${MONAD_PAIRS.join(',')}`;
    const r1 = await fetch(pairsUrl);
    const d1 = await r1.json();
    let pairs = (d1.pairs || []).filter(p => p && p.priceUsd);

    // Strategy 2: also search by name to catch more tokens
    const searches = ['CHOG monad', 'YAKI monad', 'MON USDC monad', 'shMON', 'DAK monad'];
    const searchResults = await Promise.all(
      searches.map(q =>
        fetch(`https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(q)}`)
          .then(r => r.json())
          .catch(() => ({ pairs: [] }))
      )
    );

    // Merge all results, keep only monad chain, deduplicate by baseToken address
    const seen = new Set();
    for (const result of searchResults) {
      for (const p of (result.pairs || [])) {
        if (p.chainId !== 'monad') continue;
        const key = p.baseToken?.address?.toLowerCase();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        pairs.push(p);
      }
    }

    // Deduplicate pairs from strategy 1 too
    const finalPairs = [];
    const finalSeen = new Set();
    for (const p of pairs) {
      const key = p.baseToken?.address?.toLowerCase();
      if (!key || finalSeen.has(key)) continue;
      finalSeen.add(key);
      finalPairs.push(p);
    }

    allFetchedPairs = finalPairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0));

    if (allFetchedPairs.length === 0) {
      grid.innerHTML = `<div style="color:var(--muted);padding:2rem;grid-column:1/-1;text-align:center">
        Monad mainnet data not indexed yet on DexScreener.<br>
        <span style="font-size:.78rem">Showing demo data below</span>
      </div>`;
      setTimeout(() => renderPrices('all'), 1500);
      return;
    }

    renderPricesFromData(allFetchedPairs);
  } catch (err) {
    console.error(err);
    grid.innerHTML = `<div style="color:var(--red);padding:2rem;grid-column:1/-1">⚠️ Failed to load. Showing demo data.</div>`;
    setTimeout(() => renderPrices('all'), 1500);
  }
}

function renderPricesFromData(pairs) {
  const grid = document.getElementById('pricesGrid');
  if (!pairs || pairs.length === 0) {
    grid.innerHTML = `<div style="color:var(--muted);padding:2rem;grid-column:1/-1;text-align:center">No pairs found for Monad yet. Check back soon!</div>`;
    return;
  }

  grid.innerHTML = pairs.map(p => {
    const change = parseFloat(p.priceChange?.h24 || 0);
    const changeClass = change >= 0 ? 'pos' : 'neg';
    const changeSign = change >= 0 ? '+' : '';
    const price = parseFloat(p.priceUsd || 0);
    const priceStr = price === 0 ? 'N/A'
      : price < 0.000001 ? '$' + price.toExponential(2)
      : price < 0.01 ? '$' + price.toFixed(6)
      : price < 1 ? '$' + price.toFixed(4)
      : '$' + price.toFixed(2);
    const sparks = generateSparks(change);
    const meta = p._meta || {};
    const icon = meta.emoji || (p.baseToken?.symbol || '??').slice(0, 2).toUpperCase();
    const colors = ['#836EF9','#00ffb3','#f5c542','#ff6eb4','#4dc8ff','#a4ff72','#ff7c4d','#c884ff'];
    const sym = p.baseToken?.symbol || '??';
    const col = meta.color || colors[Math.abs((sym.charCodeAt(0)||0) + (sym.charCodeAt(1)||0)) % colors.length];

    return `
      <div class="price-card" onclick="window.open('${p.url || '#'}','_blank')">
        <div class="pc-top">
          <div class="pc-icon" style="background:${col}22;color:${col};font-size:1.1rem">${icon}</div>
          <div>
            <div class="pc-name">${p.baseToken?.name || 'Unknown'}</div>
            <div class="pc-ticker">$${p.baseToken?.symbol || '???'}</div>
          </div>
        </div>
        <div class="pc-price">${priceStr}</div>
        <div class="pc-change ${changeClass}">${changeSign}${change.toFixed(2)}% (24h)</div>
        <svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none">
          <polyline points="${sparks}" fill="none" stroke="${change >= 0 ? 'var(--green)' : 'var(--red)'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="pc-stats">
          <div class="pc-stat">
            <div class="lbl">Mkt Cap</div>
            <div class="val">${formatNum(p.marketCap)}</div>
          </div>
          <div class="pc-stat">
            <div class="lbl">Vol 24h</div>
            <div class="val">${formatNum(p.volume?.h24)}</div>
          </div>
          <div class="pc-stat">
            <div class="lbl">Liquidity</div>
            <div class="val">${formatNum(p.liquidity?.usd)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function formatNum(n) {
  if (!n || isNaN(n)) return 'N/A';
  n = parseFloat(n);
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}

        <div class="pc-price">${c.price < 0.01 ? '$'+c.price.toFixed(6) : '$'+c.price.toFixed(c.price < 1 ? 4 : 2)}</div>
        <div class="pc-change ${changeClass}">${changeSign}${c.change}% (24h)</div>
        <svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none">
          <polyline points="${sparks}" fill="none" stroke="${c.change >= 0 ? 'var(--green)' : 'var(--red)'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="pc-stats">
          <div class="pc-stat"><div class="lbl">Mkt Cap</div><div class="val">$${c.mcap}</div></div>
          <div class="pc-stat"><div class="lbl">Volume</div><div class="val">$${c.vol}</div></div>
          <div class="pc-stat"><div class="lbl">Liquidity</div><div class="val">$${c.liq}</div></div>
        </div>
      </div>
    `;
  }).join('');
}

function generateSparks(trend) {
  const pts = [];
  let y = 20;
  for (let x = 0; x <= 120; x += 12) {
    y += (Math.random() - (trend >= 0 ? 0.4 : 0.6)) * 8;
    y = Math.max(4, Math.min(36, y));
    pts.push(`${x},${y}`);
  }
  return pts.join(' ');
}

function filterCoins(cat, btn) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = cat;
  if (allFetchedPairs.length > 0) {
    renderPricesFromData(allFetchedPairs);
  } else {
    renderPrices(cat);
  }
}
